<!DOCTYPE html>
<html>
<head>
  <title>NEXORA App</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>

<body style="background:#0f172a; color:white; font-family:sans-serif; text-align:center; padding:50px;">

  <h1 style="font-size:40px;">🔥 NEXORA APP</h1>
  <p>ระบบกำลังเริ่มต้น...</p>

  <div style="margin-top:40px;">
    <h2>💰 NEX Wallet</h2>
    <p>แต้มของคุณ: <b>2,450 NEX</b></p>
  </div>

  <div style="margin-top:40px;">
    <h2>🎁 Rewards</h2>
    <p>แลกรางวัลได้เร็วๆ นี้</p>
  </div>

  <div style="margin-top:40px;">
    <h2>🤖 AI Chat</h2>

    <input
      id="question"
      placeholder="พิมพ์ถาม..."
      style="padding:10px; width:260px; border-radius:10px; border:none;"
    />

    <button
      onclick="askAI()"
      style="padding:10px; border-radius:10px; margin-left:10px;"
    >
      ถาม
    </button>

    <p id="answer" style="margin-top:20px;"></p>
  </div>

  <script>
    async function askAI() {
      const q = document.getElementById("question").value;
      const answerBox = document.getElementById("answer");

      if (!q) {
        answerBox.innerText = "กรุณาพิมพ์คำถาม";
        return;
      }

      answerBox.innerText = "กำลังคิด...";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question: q })
        });

        const data = await res.json();
        answerBox.innerText = data.answer || "ไม่มีคำตอบ";
      } catch (error) {
        answerBox.innerText = "เชื่อมต่อ AI ไม่สำเร็จ";
      }
    }
  </script>

  <div style="margin-top:40px;">
    <h2>🛒 Marketplace</h2>
    <p>ระบบขายสินค้าเร็วๆ นี้</p>
  </div>

</body>
</html>
